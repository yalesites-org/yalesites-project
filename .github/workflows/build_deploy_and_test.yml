name: Build, deploy and test

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore: master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  static_tests:
    runs-on: ubuntu-26.04
    env:
      YALESITES_BUILD_TOKEN: ${{ secrets.YALESITES_BUILD_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check for contrib dependencies in root composer.json
        run: |
          contrib_check=$(jq -r '.require | with_entries(select(.key | test("(drupal\/(?!core).*$)"))) | keys | join(", ")' ./composer.json)
          if [ -n "$contrib_check" ]; then
            echo "::error::$contrib_check found in /composer.json and should be moved to /web/profiles/custom/yalesites_profile/composer.json" && exit 1
          fi
      - name: Check for unpinned dependencies
        run: |
          unpinned_dependencies=$(jq -r '.require | to_entries | map(select(.value | test("\\^|\\~|\\>|\\<")) | "\(.key): \(.value)") | join(", ")' ./web/profiles/custom/yalesites_profile/composer.json)
          if [ -n "$unpinned_dependencies" ]; then
            echo "::error::$unpinned_dependencies found in /web/profiles/custom/yalesites_profile/composer.json. Please switch to pinned versions." && exit 1
          fi

      - name: run static tests
        run: |
          ./.ci/test/static/run

  deploy_to_pantheon:
    runs-on: ubuntu-26.04
    env:
      SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      MACHINE_TOKEN: ${{ secrets.TERMINUS_TOKEN }}
      SITE: ${{ secrets.TERMINUS_SITE }}
    permissions:
      deployments: write
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
    
      - name: Install Terminus
        uses: pantheon-systems/terminus-github-actions@v1
        with:
          pantheon-machine-token: ${{ env.MACHINE_TOKEN }}

      - name: Install Terminus Build Tools Plugin
        run: terminus self:plugin:install terminus-build-tools-plugin

      - name: Build frontend components
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          YALESITES_BUILD_TOKEN: ${{ secrets.YALESITES_BUILD_TOKEN }}
        run: |
          ./.ci/build/build_frontend

      - name: Disable Integrated Composer
        run: yq -i '.build_step = false' pantheon.upstream.yml

      - name: Fetch cached Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-dev --optimize-autoloader

      - name: Save Composer cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Hello World
        run: echo "hello world" >> helloworld.txt

      - name: Git status
        run: git status

      - name: Push to Pantheon
        uses: pantheon-systems/push-to-pantheon@0.9.2
        id: push-to-pantheon
        with:
          ssh_key: ${{ env.SSH_KEY }}
          machine_token: ${{ env.MACHINE_TOKEN }}
          site: ${{ env.SITE }}
          source_env: "dev"
          delete_old_environments: true
          skip_terminus_install: true

      - name: Wake environment
        env:
          TARGET_ENV: ${{ steps.push-to-pantheon.outputs.target_env }}
        run: terminus -n env:wake "$SITE.$TARGET_ENV" --retry=5 --delay=30

      - name: Run Drush deploy
        env:
          TARGET_ENV: ${{ steps.push-to-pantheon.outputs.target_env }}
        run: terminus -n drush "$SITE.$TARGET_ENV" -- deploy -v -y

      - name: Clear Pantheon cache
        env:
          TARGET_ENV: ${{ steps.push-to-pantheon.outputs.target_env }}
        run: terminus -n env:clear-cache "$SITE.$TARGET_ENV"
