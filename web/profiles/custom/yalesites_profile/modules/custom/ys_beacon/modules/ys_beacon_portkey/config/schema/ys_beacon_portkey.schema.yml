ys_beacon_portkey.settings:
  type: config_object
  label: 'Portkey provider settings'
  mapping:
    api_key:
      type: string
      label: 'Key entity id holding the Portkey API key for chat'
    embeddings_api_key:
      type: string
      label: 'Key entity id holding the Portkey API key for embeddings (falls back to api_key)'
    host:
      type: string
      label: 'Portkey gateway base URI'
    virtual_key:
      type: string
      label: 'Portkey virtual key slug'
    config_id:
      type: string
      label: 'Portkey config slug'
    chat_models:
      type: sequence
      label: 'Chat models'
      sequence:
        type: string
        label: 'Model id'
    embeddings_models:
      type: sequence
      label: 'Embeddings models'
      sequence:
        type: string
        label: 'Model id'
