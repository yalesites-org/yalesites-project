ys_beacon.conversation:
  path: '/api/ys-beacon/v1/conversation'
  defaults:
    _controller: '\Drupal\ys_beacon\Controller\ChatApiController::conversation'
  methods: [POST]
  requirements:
    _access: 'TRUE'

ys_beacon.content_feed:
  path: '/api/ys-beacon/v1/content'
  defaults:
    _controller: '\Drupal\ys_beacon\Controller\ContentFeedController::feed'
  methods: [GET]
  requirements:
    _access: 'TRUE'

ys_beacon.settings:
  path: '/admin/config/yalesites/ys-beacon'
  defaults:
    _form: '\Drupal\ys_beacon\Form\YsBeaconSettings'
    _title: 'YaleSites Beacon settings'
  requirements:
    _permission: 'manage ys beacon settings'
    _ys_beacon_authorized: 'TRUE'

ys_beacon.admin_settings:
  path: '/admin/config/yalesites/ys-beacon/admin'
  defaults:
    _form: '\Drupal\ys_beacon\Form\YsBeaconAdminSettings'
    _title: 'YaleSites Beacon administration'
  requirements:
    _permission: 'administer ys beacon'

ys_beacon.instructions:
  path: '/admin/config/yalesites/ys-beacon/instructions'
  defaults:
    _form: '\Drupal\ys_beacon\Form\SystemInstructionsForm'
    _title: 'Beacon system instructions'
  requirements:
    _ys_beacon_instructions_access: 'TRUE'
    _ys_beacon_authorized: 'TRUE'

ys_beacon.instructions_versions:
  path: '/admin/config/yalesites/ys-beacon/instructions/versions'
  defaults:
    _controller: '\Drupal\ys_beacon\Controller\SystemInstructionsController::versionHistory'
    _title: 'Beacon system instructions version history'
  requirements:
    _ys_beacon_instructions_access: 'TRUE'
    _ys_beacon_authorized: 'TRUE'

ys_beacon.instructions_view:
  path: '/admin/config/yalesites/ys-beacon/instructions/versions/{version}'
  defaults:
    _controller: '\Drupal\ys_beacon\Controller\SystemInstructionsController::viewVersion'
    _title: 'View Beacon system instructions version'
  requirements:
    _ys_beacon_instructions_access: 'TRUE'
    _ys_beacon_authorized: 'TRUE'
    version: \d+

ys_beacon.instructions_revert:
  path: '/admin/config/yalesites/ys-beacon/instructions/revert/{version}'
  defaults:
    _form: '\Drupal\ys_beacon\Form\SystemInstructionsRevertForm'
    _title: 'Revert Beacon system instructions'
  requirements:
    _ys_beacon_instructions_access: 'TRUE'
    _ys_beacon_authorized: 'TRUE'
    version: \d+
