services:
  # Custom channel for error logging.
  logger.channel.ys_layouts:
    parent: logger.channel_base
    arguments: ['ys_layouts']
  # Used to update layout builder configuration on existing entities.
  ys_layouts.updater:
    class: Drupal\ys_layouts\Service\LayoutUpdater
    arguments: ['@config.factory', '@database', '@entity_type.manager', '@entity_field.manager', '@logger.channel.ys_layouts', '@messenger']
  # en_US Unicode collator used by ResourceAuthorBuilder for last-then-first
  # sorting of merged affiliated/non-affiliated authors. Registered as a
  # service so it can be injected and overridden in tests if needed.
  ys_layouts.author_collator:
    class: Collator
    arguments: ['en_US']
  # Builds the merged + sorted author list for Resource nodes.
  # Used by ResourceMetaBlock and atomic_preprocess_node() so the block
  # render and the view-row templates produce identical output.
  ys_layouts.resource_author_builder:
    class: Drupal\ys_layouts\Service\ResourceAuthorBuilder
    arguments: ['@ys_layouts.author_collator']
  # Resolves cover-image alt text for Resource media.
  # Used by ResourceMetaBlock and atomic_preprocess_node() so the block
  # render and the card/list templates apply identical alt text.
  ys_layouts.media_alt_resolver:
    class: Drupal\ys_layouts\Service\MediaAltResolver
  # Clones a single inline block within a Layout Builder section. Reuses
  # quick_node_clone's deep-clone helpers so per-block cloning and node cloning
  # stay in sync.
  ys_layouts.block_cloner:
    class: Drupal\ys_layouts\Service\BlockCloner
    arguments: ['@quick_node_clone.entity.form_builder', '@uuid', '@entity_type.manager', '@logger.channel.ys_layouts']
