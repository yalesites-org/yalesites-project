chat:
  input:
    description: 'Input provided to the model.'
    type: 'array'
    default:
      - { role: "system", content: "You are a helpful assistant." }
      - { role: "user", content: "Introduce yourself!" }
    required: true
  authentication:
    description: 'Portkey API Key.'
    type: 'string'
    default: ''
    required: true
  configuration:
    max_tokens:
      label: 'Max Tokens'
      description: 'The maximum number of tokens that can be generated in the chat completion.'
      type: 'integer'
      default: 4096
      required: false
      constraints:
        min: 0
        max: 4096
    temperature:
      label: 'Temperature'
      description: 'Sampling temperature 0-2. Higher values mean more random output.'
      type: 'float'
      default: 0.2
      required: false
      constraints:
        min: 0
        max: 2
        step: 0.1
embeddings:
  input:
    description: 'Text to generate embeddings for.'
    type: 'string'
    default: 'Once upon a time in London.'
    required: true
  authentication:
    description: 'Portkey API Key.'
    type: 'string'
    default: ''
    required: true
  configuration: []
