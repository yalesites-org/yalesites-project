services:
  ys_ai.settings_enabled_access_check:
    class: Drupal\ys_ai\Access\SettingsEnabledAccessCheck
    arguments: ['@config.factory']

  ys_ai.beacon_search_config_override:
    class: Drupal\ys_ai\Config\BeaconSearchConfigOverride
    arguments: ['@key.repository', '@config.storage']
    tags:
      - { name: config.factory.override, priority: 5 }

  logger.channel.ys_ai:
    parent: logger.channel_base
    arguments: ['ys_ai']

  ys_ai.beacon_index_provisioner:
    class: Drupal\ys_ai\Service\BeaconIndexProvisioner
    # The Azure client is optional (@?) so the service container can compile
    # when the Azure AI Search module is not yet enabled. Without this, a
    # first-time deploy that enables the module via config import cannot even
    # bootstrap drush (the drush.services.yml command depends on this service),
    # so `drush deploy` fails before `cim` can enable the module. The
    # provisioner guards against a null client at runtime.
    arguments: ['@config.factory', '@key.repository', '@?azure_ai_search.api', '@logger.channel.ys_ai']

  ys_ai.beacon_server_config_subscriber:
    class: Drupal\ys_ai\EventSubscriber\BeaconServerConfigSubscriber
    tags:
      - { name: event_subscriber }

