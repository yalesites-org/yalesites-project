ys_ai.tester:
  path: '/admin/config/yalesites/ys_ai/tester'
  defaults:
    _form: '\Drupal\ys_ai_tester\Form\AiTesterForm'
    _title: 'AI Tester'
  requirements:
    _permission: 'use ys ai tester'

ys_ai.tester_run:
  path: '/admin/config/yalesites/ys_ai/tester/{run_id}'
  defaults:
    _controller: '\Drupal\ys_ai_tester\Controller\AiTesterController::run'
    _title: 'AI Tester Run'
  requirements:
    _permission: 'use ys ai tester'
    run_id: '\d+'

ys_ai.tester_download_json:
  path: '/admin/config/yalesites/ys_ai/tester/{run_id}/download/json'
  defaults:
    _controller: '\Drupal\ys_ai_tester\Controller\AiTesterController::downloadJson'
    _title: 'Download JSON'
  requirements:
    _permission: 'use ys ai tester'
    run_id: '\d+'

ys_ai.tester_download_yaml:
  path: '/admin/config/yalesites/ys_ai/tester/{run_id}/download/yaml'
  defaults:
    _controller: '\Drupal\ys_ai_tester\Controller\AiTesterController::downloadYaml'
    _title: 'Download YAML'
  requirements:
    _permission: 'use ys ai tester'
    run_id: '\d+'
