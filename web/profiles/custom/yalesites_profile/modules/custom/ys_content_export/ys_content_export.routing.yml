ys_content_export.export_pages:
  path: '/admin/content/manage-pages/export'
  defaults:
    _controller: 'Drupal\ys_content_export\Controller\ContentExportController::export'
    _title: 'Export pages to CSV'
    bundle: page
  requirements:
    _permission: 'yalesites manage settings'

