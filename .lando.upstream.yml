name: yalesites-web-property
recipe: pantheon
config:
  framework: drupal8
  # Disable the SOLR index
  index: false
  # Enable the VARNISH edge
  edge: true
  # Enable the REDIS cache
  cache: true
services:
  appserver:
    build_as_root:
      # Composer package drupal/ai_vdb_provider_postgres requires ext-pgsql / pdo_pgsql.
      - apt-get update -y && apt-get install -y libpq-dev && docker-php-ext-install -j "$(nproc)" pdo_pgsql pgsql
    overrides: {}
  pgvector:
    type: postgres:16
    portforward: true
    creds:
      user: postgres
      password: postgres
      database: pgvector
    overrides:
      image: pgvector/pgvector:pg16
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: pgvector
      volumes:
        - ./.lando/pgvector-init.sql:/docker-entrypoint-initdb.d/zzz-pgvector.sql:ro
tooling:
  phpunit:
    service: appserver
    user: www-data
    cmd:
      - appserver: php /app/vendor/bin/phpunit -c /app/phpunit.xml
  pgvector-init:
    service: pgvector
    cmd: psql -U postgres -d pgvector -c "CREATE EXTENSION IF NOT EXISTS vector;"
    description: Ensure the pgvector extension exists (needed if the DB volume was created before init SQL ran)
  ai-search-init:
    service: appserver
    cmd: drush php:script /app/scripts/local/ai-search-init.php
    description: Create pgvector collection and sync AI search index field schema (run after cim)
